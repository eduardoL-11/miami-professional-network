<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P-03 · Solicitar acceso de empleador — Miami Professional Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/brand.css" />
  <link rel="stylesheet" href="../../css/lang-toggle.css" />
  <link rel="stylesheet" href="../../css/auth.css" />
</head>
<body class="auth">

  <header class="auth-top">
    <a href="../../index.html" class="brand">
      <img src="../../assets/logo-fullcolor.png" alt="" />
      <span>Miami Professional Network</span>
    </a>
    <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme"><i class="i" data-icon="moon" data-theme-icon="dark"></i><i class="i" data-icon="sun" data-theme-icon="light"></i></button>
    <div class="lang-toggle">
      <button data-lang="es">ES</button>
      <button data-lang="en">EN</button>
    </div>
  </header>

  <main class="auth-shell">
    <div class="auth-card wide">

      <div class="t-overline muted mb-2" data-i18n-es="P-03 · Empleador" data-i18n-en="P-03 · Employer">P-03 · Empleador</div>
      <h1 data-i18n-es="Solicita acceso para tu empresa" data-i18n-en="Request access for your company">Solicita acceso para tu empresa</h1>
      <p class="sub" data-i18n-es="Las cuentas de empleador requieren aprobación. Revisamos cada solicitud en 1–2 días hábiles." data-i18n-en="Employer accounts require approval. We review each request within 1–2 business days.">Las cuentas de empleador requieren aprobación. Revisamos cada solicitud en 1–2 días hábiles.</p>

      <div class="role-tabs">
        <button onclick="window.location='p02-candidate-signup.html'" data-i18n-es="Soy candidato" data-i18n-en="I'm a candidate">Soy candidato</button>
        <button class="active" data-i18n-es="Soy empleador" data-i18n-en="I'm an employer">Soy empleador</button>
      </div>

      <form class="auth-form" onsubmit="event.preventDefault();">

        <div>
          <label class="label" data-i18n-es="Nombre de la empresa" data-i18n-en="Company name">Nombre de la empresa <span class="req">*</span></label>
          <input class="input" placeholder="Sunset Hotels Group" />
        </div>

        <div class="field-row">
          <div>
            <label class="label" data-i18n-es="Nombre del contacto" data-i18n-en="Contact name">Nombre del contacto <span class="req">*</span></label>
            <input class="input" placeholder="Carlos Rivera" />
          </div>
          <div>
            <label class="label" data-i18n-es="Cargo" data-i18n-en="Role">Cargo</label>
            <input class="input" placeholder="Head of HR" />
          </div>
        </div>

        <div class="field-row">
          <div>
            <label class="label">Email <span class="req">*</span></label>
            <input class="input" type="email" placeholder="carlos@sunset.com" />
          </div>
          <div>
            <label class="label" data-i18n-es="Teléfono" data-i18n-en="Phone">Teléfono <span class="req">*</span></label>
            <input class="input" placeholder="+1 (305) 555-0142" />
          </div>
        </div>

        <div class="field-row">
          <div>
            <label class="label">Industry <span class="req">*</span></label>
            <select class="select">
              <option>Hospitality</option><option>Tech</option><option>Healthcare</option><option>Construction</option><option>Retail</option><option>Finance</option><option>Other</option>
            </select>
          </div>
          <div>
            <label class="label" data-i18n-es="Roles abiertos" data-i18n-en="Open roles">Roles abiertos <span class="req">*</span></label>
            <select class="select">
              <option>1</option><option>2–5</option><option selected>5–10</option><option>10–25</option><option>25+</option>
            </select>
          </div>
        </div>

        <div>
          <label class="label" data-i18n-es="Necesidades de contratación" data-i18n-en="Hiring needs">Necesidades de contratación <span class="req">*</span></label>
          <textarea class="textarea" data-i18n-es-placeholder="Cuéntanos qué tipo de perfiles buscas, plazos, ubicaciones…" data-i18n-en-placeholder="Tell us about the profiles you need, timelines, locations…" placeholder="Cuéntanos qué tipo de perfiles buscas, plazos, ubicaciones…"></textarea>
        </div>

        <div>
          <label class="label" data-i18n-es="Contraseña" data-i18n-en="Password">Contraseña <span class="req">*</span></label>
          <input class="input" type="password" placeholder="••••••••" />
          <div class="hint" data-i18n-es="Mínimo 8 caracteres, una mayúscula y un número." data-i18n-en="At least 8 characters, one uppercase and one number.">Mínimo 8 caracteres, una mayúscula y un número.</div>
        </div>

        <label class="row gap-2 items-start" style="cursor: pointer; font-size: 13px; color: var(--ink-700); margin-top: 6px;">
          <input type="checkbox" style="margin-top: 3px;" />
          <span data-i18n-es-html="Acepto los <a href='#'>Términos de servicio</a>, la <a href='#'>Política de privacidad</a> y los <a href='#'>Términos del fee 1% por contratación</a>." data-i18n-en-html="I accept the <a href='#'>Terms of Service</a>, <a href='#'>Privacy Policy</a> and <a href='#'>1% Hiring Fee Terms</a>.">Acepto los <a href="#">Términos de servicio</a>, la <a href="#">Política de privacidad</a> y los <a href="#">Términos del fee 1% por contratación</a>.</span>
        </label>

        <a href="../employer/e01-pending-approval.html" class="btn btn-primary btn-lg w-full mt-2" style="display: flex; justify-content: center;" data-i18n-es="Enviar solicitud" data-i18n-en="Submit request">Enviar solicitud</a>

      </form>

      <div class="auth-foot">
        <span data-i18n-es="¿Ya tienes cuenta?" data-i18n-en="Already have an account?">¿Ya tienes cuenta?</span>
        <a href="p04-login.html" data-i18n-es="Iniciar sesión" data-i18n-en="Sign in">Iniciar sesión</a>
      </div>

    </div>
  </main>

  <script src="../../js/theme.js"></script>
  <script src="../../js/icons.js"></script>
  <script src="../../js/i18n.js"></script>
</body>
</html>
